spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
app.cors.allowed-origins=https://edustay.vercel.app

# =========================
# PRODUCTION DATABASE OVERRIDES (MariaDB)
# =========================
spring.datasource.url=jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver