spring.application.name=edustay.backend
spring.profiles.active=dev
spring.config.import=optional:file:.env[.properties]

# =========================
# BASE DE DATOS
# =========================
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:edustay_db}?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Fix bug Hibernate 7 con columna RESERVED en MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# JWT
# =========================
app.jwt.secret=${JWT_SECRET:mySecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================
# GOOGLE SOCIAL LOGIN
# =========================
app.google.client-id=${GOOGLE_CLIENT_ID:}

# =========================
# SERVLET
# =========================
server.servlet.context-path=/

# =========================
# OPENAPI / SCALAR
# =========================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false

# =========================
# RESEND
# =========================
app.resend.api-key=${RESEND_API_KEY:re_default_key}
app.resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# =========================
# OPENAI MODERATION
# =========================
app.openai.api-key=${OPENAI_API_KEY:openai_default_key}

# =========================
# CORS
# =========================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,*}

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized