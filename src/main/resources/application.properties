spring.application.name=edustay.backend
spring.config.import=optional:file:.env[.properties]

# =========================
# BASE DE DATOS (con .env)
# =========================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:edustay_db}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE (seguro)
# =========================
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false

# Hibernate auto-detecta el dialecto automáticamente en base al driver
# No es necesario especificar spring.jpa.database-platform en Hibernate 7.x

# =========================
# JWT CONFIGURATION
# =========================
app.jwt.secret=${JWT_SECRET:mySecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================
# SERVLET CONFIGURATION
# =========================
server.servlet.context-path=/

# =========================
# OPENAPI / SCALAR CONFIGURATION
# =========================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false