spring.application.name=edustay.backend

# CONFIGURACIÓN DE BASE DE DATOS (MySQL)
# Usamos variables de entorno ${VARIABLE:valor_por_defecto}
# Si el developer no tiene la variable configurada, usará el valor después de los ":"

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:edustay_db}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:password_aquí}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
# Modelos CamelCase se convierten a snake_case en la BD
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actualiza el esquema de la BD automáticamente según los modelos
spring.jpa.hibernate.ddl-auto=update

# Dialecto para MySQL 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect